<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNAP RUSH — 랭킹</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="scanlines" aria-hidden="true"></div>
  <div class="grid-bg"   aria-hidden="true"></div>

  <main class="ranking-screen">

    <!-- 헤더 -->
    <header class="ranking-header">
      <h1 class="ranking-title glitch" data-text="RANKING">RANKING</h1>
      <p class="ranking-subtitle" id="ranking-subtitle">// 상위 기록</p>
    </header>

    <div class="ranking-body">

      <!-- 내 최고 기록 카드 (있을 때만 표시) -->
      <div class="personal-best-card" id="pb-card" style="display:none;">
        <div>
          <div class="pb-label">내 최고 기록</div>
          <div class="pb-name" id="pb-name">—</div>
        </div>
        <div class="pb-score" id="pb-score">—</div>
      </div>

      <!-- 랭킹 테이블 -->
      <table class="rank-table" id="rank-table">
        <thead>
          <tr>
            <th>순위</th>
            <th>닉네임</th>
            <th>점수</th>
          </tr>
        </thead>
        <tbody id="rank-body">
          <!-- JS로 채워짐 -->
        </tbody>
      </table>

      <!-- 기록 없을 때 -->
      <div class="rank-empty" id="rank-empty">
        아직 기록이 없습니다.<br/>먼저 게임을 플레이해 보세요!
      </div>

    </div>

    <!-- 하단 버튼 -->
    <div class="ranking-footer">
      <a class="btn btn-primary" href="index.html" style="font-size:10px; text-decoration:none;">
        SNAP RUSH 하기 →
      </a>
      <button class="btn btn-ghost" id="btn-clear" style="font-size:11px;">
        기록 초기화
      </button>
    </div>

  </main>

  <!-- ── 관리자 비밀번호 모달 ────────────────────────────── -->
  <div class="modal-backdrop" id="modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <p class="modal-title" id="modal-title">관리자 인증</p>
        <button class="modal-close" id="modal-close" aria-label="닫기">✕</button>
      </div>
      <p class="modal-desc">기록 초기화는 관리자만 가능합니다.</p>
      <div class="modal-body">
        <label class="label" for="pw-input">비밀번호</label>
        <div class="pw-input-wrap">
          <input
            class="input"
            type="password"
            id="pw-input"
            placeholder="비밀번호 입력"
            autocomplete="off"
          />
          <button class="pw-toggle" id="pw-toggle" aria-label="비밀번호 표시/숨김" tabindex="-1">
            <span id="pw-eye">👁</span>
          </button>
        </div>
        <p class="modal-error hidden" id="modal-error">비밀번호가 올바르지 않습니다</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost"    id="modal-cancel" style="font-size:12px;">취소</button>
        <button class="btn btn-primary"  id="modal-confirm" style="font-size:10px;">확인</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/ranking.js"></script>
</body>
</html>
